listen_addr: ":8080"
public_url: "https://vpn.example.com"
data_dir: "/var/lib/vpn-manager"

oidc:
  issuer: "https://auth.example.com"
  client_id: "vpn-manager"
  client_secret_env: "OIDC_CLIENT_SECRET"
  groups_claim: "groups"
  scopes: ["openid", "profile", "email", "groups"]

wireguard:
  users:
    interface: wg-users
    listen_port: 51820
    address: "10.100.0.1/16"
    endpoint: "vpn.example.com:51820"
    dns: ["192.168.1.1"]
    allowed_ips: ["192.168.1.0/24"]   # split tunnel: only home LAN routed

  home:
    interface: wg-home
    listen_port: 51821
    address: "10.99.0.1/30"
    peer:
      public_key: "REPLACE_WITH_OPNSENSE_WG_PUBLIC_KEY"
      allowed_ips: ["10.99.0.2/32", "192.168.1.0/24"]
      # No endpoint here: OPNsense dials in (home network has dynamic IP).

groups:
  admins: { cidr: "10.100.10.0/24" }
  family: { cidr: "10.100.20.0/24" }
  guests: { cidr: "10.100.30.0/24" }

default_group: guests
