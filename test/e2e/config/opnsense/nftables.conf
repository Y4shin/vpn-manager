#!/usr/sbin/nft -f

# Don't flush the ruleset — Docker installs NAT rules we need (e.g. for the
# embedded DNS at 127.0.0.11). Just add our own table; idempotent on reload.
table inet vpn_fw
delete table inet vpn_fw

table inet vpn_fw {
    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept

        # Admins: full home LAN access.
        ip saddr 10.100.10.0/24 ip daddr 192.168.1.0/24 accept

        # Guests: only the NAS at 192.168.1.10.
        ip saddr 10.100.30.0/24 ip daddr 192.168.1.10 accept
        # (anything else from guests falls through to the policy drop)

        # Return path: home LAN replying back to user CIDRs.
        ip saddr 192.168.1.0/24 ip daddr 10.100.0.0/16 accept
    }
}
