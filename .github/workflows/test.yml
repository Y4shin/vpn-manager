name: test

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - run: nix develop --command go vet ./...
      - run: nix develop --command go test ./...

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: load wireguard kernel module
        run: sudo modprobe wireguard
      - run: nix develop --command go test -tags=e2e -v -timeout=15m ./test/e2e

  publish:
    runs-on: ubuntu-latest
    needs: [unit, e2e]
    # Only on pushes to main or v*.*.* tags — not on PRs.
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            # push to main → preview-<shortsha> + preview-latest
            type=sha,prefix=preview-,format=short,enable={{is_default_branch}}
            type=raw,value=preview-latest,enable={{is_default_branch}}
            # vX.Y.Z tag → vX.Y.Z + latest
            type=semver,pattern={{raw}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
